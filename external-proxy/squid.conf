# Do not write a PID file
pid_filename none

# 1. Plain HTTP proxy port (Supports SSL-Bumping the destination)
# Use with: export https_proxy=http://<ip>:8080
http_port 8080 ssl-bump cert=/certs/tls.crt key=/certs/tls.key generate-host-certificates=on dynamic_cert_mem_cache_size=4MB

# 2. Secure HTTPS proxy port (Secure proxy tunnel ONLY, no inner bumping)
# Use with: export https_proxy=https://<ip>:8443
# https_port 8443 tls-cert=/certs/tls.crt tls-key=/certs/tls.key
https_port 8443 intercept ssl-bump generate-host-certificates=on dynamic_cert_mem_cache_size=4MB cert=/certs/tls.crt

# Define SSL Bump rules: Peek at the SNI, then bump (intercept) all traffic
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Allow all access as requested
http_access allow all

# SSL certificate generator configuration
sslcrtd_program /usr/lib64/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB
sslcrtd_children 5

# Basic cache and log configuration
cache_dir ufs /var/spool/squid 100 16 256
coredump_dir /var/spool/squid
access_log stdio:/proc/self/fd/1
cache_log stdio:/proc/self/fd/2
