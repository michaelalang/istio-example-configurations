apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: squid-cert
spec:
  commonName: squid
  dnsNames:
  - squid-proxy
  - squid-proxy.apps.example.com
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: example-cluster-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: gateway-secret
  subject:
    countries:
    - US
    organizationalUnits:
    - Example
    organizations:
    - Example
