apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quay
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: registries/auth.json
        metadataPolicy: None
        property: data
      secretKey: datab64
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: quay
    template:
      data:
        .dockerconfigjson: '{{ .datab64 }}'
      engineVersion: v2
      mergePolicy: Replace
      type: kubernetes.io/dockerconfigjson
