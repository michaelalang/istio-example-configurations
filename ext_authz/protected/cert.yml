apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: http-gateway-cert
spec:
  commonName: http.apps.example.com
  dnsNames:
  - http.apps.example.com
  - oauth-mesh.apps.example.com
  - sso.apps.example.com
  isCA: false
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: example-cluster-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: gateway-secret
  subject:
    countries:
    - US
    organizationalUnits:
    - Example
    organizations:
    - Example
