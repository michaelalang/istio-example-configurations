apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
spec:
  namespace: istio-system
  values:
    meshConfig:
      extensionProviders:
        - name: "oauth2-proxy"
          envoyExtAuthzHttp:
            service: "oauth2-proxy.istio-system.svc.cluster.local"
            port: 4180
            includeAdditionalHeadersInCheck:
              x-auth-request-redirect: "https://%REQ(:authority)%%REQ(:path)%"
            includeRequestHeadersInCheck:
            - "authorization"
            - "cookie"
            - "x-auth-request-redirect"
            - "host"
            - "x-forwarded-proto"
            - "x-forwarded-host"
            - "x-forwarded-uri"
            headersToUpstreamOnAllow:
            - "authorization"
            - "path"
            - "x-auth-request-user"
            - "x-auth-request-email"
            - "x-auth-request-access-token"
            headersToDownstreamOnDeny:
            - "content-type"
            - "set-cookie"
            - "location"
