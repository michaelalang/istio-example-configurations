apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: http-apps-example-com
spec:
  commonName: 'http.apps.example.com'
  dnsNames:
    - 'http.apps.example.com'
  isCA: false
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: example-intermediate-acm-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: http-apps-example-com
  subject:
    countries:
      - US
    organizationalUnits:
      - Example Lab
    organizations:
      - Example
