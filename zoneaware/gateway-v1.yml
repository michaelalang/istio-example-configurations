apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-v1
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      istio: gateway-v1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        inject.istio.io/templates: gateway,spireGateway
        sidecar.istio.io/componentLogLevel: router:debug,http:debug,http2:debug
      creationTimestamp: null
      labels:
        istio: gateway-v1
        istio-locality: lab.hcp1.zone3
        sidecar.istio.io/inject: 'true'
        spiffe.io/spire-managed-identity: 'true'
    spec:
      containers:
        - image: auto
          imagePullPolicy: Always
          name: istio-proxy
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /etc/istio/service-ca
              name: service-ca
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: openshift-service-ca.crt
          name: service-ca
      nodeSelector:
        topology.istio.io/subzone: zone1
