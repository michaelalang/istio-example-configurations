apiVersion: v1
kind: Service
metadata:
  name: http
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: http
  sessionAffinity: None
  trafficDistribution: PreferClose
  type: ClusterIP
